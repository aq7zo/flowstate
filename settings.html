<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>Flowstate · Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js" defer></script>
    <script type="module" src="./js/pages/settings-page.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand-wrap">
        <p class="brand" translate="no">flowstate<span class="brand-dot">.</span></p>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="./tasks.html">Today</a>
        <a href="./focus.html">Focus</a>
        <a href="./calendar.html">Calendar</a>
        <a href="./settings.html" data-active="true">Settings</a>
      </nav>
    </header>

    <main class="app-main">
      <section class="view">
        <div class="section-head">
          <div>
            <h1>Settings</h1>
            <p class="muted">Manage local data and preferences.</p>
          </div>
        </div>

        <section class="panel">
          <h2>General</h2>
          <div class="form-grid">
            <div class="field-row">
              <label for="default-priority-setting">Default Task Priority</label>
              <select id="default-priority-setting">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="field-row">
              <label for="carry-threshold-setting">Carry-over Prompt Threshold</label>
              <input id="carry-threshold-setting" type="number" min="1" step="1" inputmode="numeric" />
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Pomodoro</h2>
          <div class="form-grid">
            <div class="field-row">
              <label for="setting-work-min">Work (Minutes)</label>
              <input id="setting-work-min" type="number" min="5" step="1" inputmode="numeric" />
            </div>
            <div class="field-row">
              <label for="setting-short-break-min">Short Break</label>
              <input id="setting-short-break-min" type="number" min="1" step="1" inputmode="numeric" />
            </div>
            <div class="field-row">
              <label for="setting-long-break-min">Long Break</label>
              <input id="setting-long-break-min" type="number" min="1" step="1" inputmode="numeric" />
            </div>
            <div class="field-row">
              <label for="setting-sessions-before-long">Sessions Before Long Break</label>
              <input id="setting-sessions-before-long" type="number" min="1" step="1" inputmode="numeric" />
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Integrations</h2>
          <div class="field-row">
            <label for="canvas-domain">Canvas Domain</label>
            <input id="canvas-domain" type="url" inputmode="url" autocomplete="off" placeholder="https://canvas.example.edu" />
          </div>
          <div class="field-row">
            <label for="canvas-token">Canvas Access Token</label>
            <input id="canvas-token" type="password" autocomplete="off" placeholder="Paste personal access token…" />
          </div>
          <div class="field-row">
            <label for="unical-url">UniCalendar Feed URL</label>
            <input id="unical-url" type="url" inputmode="url" autocomplete="off" placeholder="https://calendar-feed.ics" />
          </div>
          <div class="modal-actions">
            <button id="canvas-save-btn" type="button" class="btn btn-secondary">Save Canvas Credentials</button>
            <button id="canvas-sync-btn" type="button" class="btn btn-primary">Sync Canvas</button>
            <button id="unical-sync-btn" type="button" class="btn btn-ghost">Sync UniCalendar</button>
          </div>
          <p id="integration-status" class="mono muted" aria-live="polite"></p>
        </section>

        <section class="panel">
          <h2>Custom Tags</h2>
          <form id="custom-tag-form" class="form-grid">
            <div class="field-row">
              <label for="custom-tag-name">Tag Name</label>
              <input id="custom-tag-name" type="text" maxlength="30" autocomplete="off" placeholder="School" />
            </div>
            <div class="field-row">
              <label for="custom-tag-color">Tag Color</label>
              <input id="custom-tag-color" type="color" value="#3dd9c5" />
            </div>
            <div class="task-form-actions">
              <button type="submit" class="btn btn-primary">Add Tag</button>
            </div>
          </form>
          <ul id="custom-tag-list" class="task-list"></ul>
        </section>

        <section class="panel">
          <h2>Data</h2>
          <div class="modal-actions">
            <button id="export-json" type="button" class="btn btn-primary">Export Backup (JSON)</button>
            <button id="import-json-trigger" type="button" class="btn btn-secondary">Import Backup</button>
            <button id="clear-data-btn" type="button" class="btn btn-ghost">Clear All Data</button>
          </div>
          <input id="import-json-file" type="file" accept=".json,application/json" hidden />
          <p id="export-status" class="mono muted" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <dialog id="import-preview-modal" class="modal">
      <form id="import-preview-form" class="modal-content">
        <h2>Import Backup</h2>
        <p id="import-preview-copy"></p>
        <div class="modal-actions">
          <button id="import-merge-btn" type="button" class="btn btn-primary">Merge</button>
          <button id="import-replace-btn" type="button" class="btn btn-secondary">Replace</button>
          <button id="import-close-btn" type="button" class="btn btn-ghost">Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
