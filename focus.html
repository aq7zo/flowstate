<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>Flowstate · Focus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js" defer></script>
    <script type="module" src="./js/pages/focus-page.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand-wrap">
        <p class="brand" translate="no">flowstate<span class="brand-dot">.</span></p>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="./tasks.html">Today</a>
        <a href="./focus.html" data-active="true">Focus</a>
        <a href="./calendar.html">Calendar</a>
        <a href="./settings.html">Settings</a>
      </nav>
    </header>

    <main class="app-main">
      <section class="view">
        <div class="section-head">
          <div>
            <h1>Focus Mode</h1>
            <p class="muted">Go deep. Come back. Repeat.</p>
          </div>
        </div>
        <section class="panel focus-single">
          <div class="focus-panel-header">
            <button id="focus-settings-back" type="button" class="btn btn-ghost" hidden>← Back</button>
            <button id="focus-settings-toggle" type="button" class="icon-btn focus-cog" aria-label="Timer settings" aria-expanded="false">⚙</button>
          </div>

          <div id="focus-timer-view" class="focus-view">
            <div class="timer-panel">
              <p id="timer-phase" class="chip mono">IDLE</p>
              <p id="timer-display" class="timer-display mono" aria-live="polite">25:00</p>
              <p id="timer-session" class="muted mono">Session 0 of 4</p>
              <div class="timer-controls">
                <button id="timer-toggle" type="button" class="btn btn-primary" aria-pressed="false">Start</button>
                <button id="timer-reset" type="button" class="btn btn-ghost">Reset</button>
              </div>
            </div>
          </div>

          <div id="focus-settings-view" class="focus-view" hidden>
            <form id="alarm-form" class="alarm-panel" aria-label="Alarm settings">
              <h2>Timer Settings</h2>
              <div class="field-row">
                <label for="alarm-file">Upload Audio (mp3, wav, ogg)</label>
                <input id="alarm-file" name="alarmFile" type="file" accept=".mp3,.wav,.ogg,audio/*" />
              </div>
              <div class="field-row">
                <label for="alarm-type">Alarm Type</label>
                <select id="alarm-type" name="alarmType">
                  <option value="file">File</option>
                  <option value="youtube">YouTube</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div class="field-row">
                <label for="alarm-youtube-url">YouTube URL</label>
                <input id="alarm-youtube-url" name="alarmYoutubeUrl" type="url" inputmode="url" autocomplete="off" placeholder="https://www.youtube.com/watch?v=..." />
              </div>
              <div class="field-row">
                <label for="alarm-volume">Volume</label>
                <input id="alarm-volume" name="alarmVolume" type="range" min="0" max="1" step="0.05" />
              </div>
              <div class="field-row checkbox-row">
                <input id="alarm-fade" name="alarmFade" type="checkbox" />
                <label for="alarm-fade">Fade in over 8 seconds</label>
              </div>
              <div class="timer-controls">
                <button id="alarm-save" type="submit" class="btn btn-primary">Save Alarm</button>
                <button id="alarm-preview" type="button" class="btn btn-secondary">Preview</button>
              </div>
              <p id="alarm-status" class="mono muted" aria-live="polite"></p>
            </form>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
