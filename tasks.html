<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="manifest" href="./manifest.json" />
    <title>Flowstate · Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js" defer></script>
    <script type="module" src="./js/pages/tasks-page.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to Main Content</a>
    <header class="app-header">
      <div class="brand-wrap">
        <p class="brand" translate="no">flowstate<span class="brand-dot">.</span></p>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="./tasks.html" data-active="true">Tasks</a>
        <a href="./focus.html">Focus</a>
        <a href="./calendar.html">Calendar</a>
        <a href="./settings.html" class="top-nav-cog" aria-label="Settings">⚙</a>
      </nav>
    </header>

    <main id="main-content" class="app-main">
      <section class="view">
        <div id="widgets-container"></div>

        <div class="task-panels-layout">
          <section class="panel task-main-panel">
            <div class="panel-head">
              <p id="task-summary" class="mono muted" aria-live="polite"></p>
            </div>
            <p id="planning-warning" class="planning-warning mono muted" aria-live="polite"></p>
            <p id="task-inline-feedback" class="planning-warning mono" aria-live="polite"></p>

            <div class="task-workspace">
              <div id="task-buckets" class="task-buckets">
                <section class="task-bucket-card" data-bucket="today">
                  <div class="task-bucket-head">
                    <button type="button" class="bucket-toggle" data-bucket-toggle="today" aria-expanded="true">Today</button>
                    <div class="bucket-tools">
                      <span class="bucket-count mono" data-bucket-count="today" hidden>0</span>
                      <button type="button" class="icon-btn bucket-add-btn" data-bucket-add="today" aria-label="Add task to Today">+</button>
                    </div>
                  </div>
                  <ul id="task-list-today" class="task-list" aria-live="polite"></ul>
                </section>

                <section class="task-bucket-card" data-bucket="tomorrow">
                  <div class="task-bucket-head">
                    <button type="button" class="bucket-toggle" data-bucket-toggle="tomorrow" aria-expanded="false">Tomorrow</button>
                    <div class="bucket-tools">
                      <span class="bucket-count mono" data-bucket-count="tomorrow" hidden>0</span>
                      <button type="button" class="icon-btn bucket-add-btn" data-bucket-add="tomorrow" aria-label="Add task to Tomorrow">+</button>
                    </div>
                  </div>
                  <ul id="task-list-tomorrow" class="task-list" aria-live="polite" hidden></ul>
                </section>

                <section class="task-bucket-card" data-bucket="upcoming">
                  <div class="task-bucket-head">
                    <button type="button" class="bucket-toggle" data-bucket-toggle="upcoming" aria-expanded="false">Upcoming</button>
                    <div class="bucket-tools">
                      <span class="bucket-count mono" data-bucket-count="upcoming" hidden>0</span>
                      <button type="button" class="icon-btn bucket-add-btn" data-bucket-add="upcoming" aria-label="Add task to Upcoming">+</button>
                    </div>
                  </div>
                  <ul id="task-list-upcoming" class="task-list" aria-live="polite" hidden></ul>
                </section>
              </div>
            </div>
          </section>

          <aside class="creation-panel">
            <form id="task-form" class="task-form" aria-label="Create task">
              <div class="field-row">
                <label for="task-title">Task Title</label>
                <input id="task-title" name="taskTitle" type="text" maxlength="120" required autocomplete="off" placeholder="Write lab report..." />
              </div>
              <div class="form-grid">
                <div class="field-row">
                  <label for="task-priority">Priority</label>
                  <select id="task-priority" name="taskPriority">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
                <div class="field-row">
                  <label for="task-estimated">Estimated Minutes</label>
                  <input id="task-estimated" name="taskEstimated" type="number" min="0" step="5" inputmode="numeric" autocomplete="off" placeholder="45" />
                </div>
              </div>
              <div class="field-row">
                <label for="task-notes">Notes</label>
                <textarea id="task-notes" name="taskNotes" maxlength="500" rows="3" placeholder="Add context for this task..."></textarea>
              </div>
              <div class="field-row">
                <label for="task-link">Reference Link</label>
                <input id="task-link" name="taskLink" type="url" inputmode="url" autocomplete="off" placeholder="https://canvas.example.com/..." />
              </div>
              <div class="task-form-actions">
                <button type="submit" class="btn btn-primary">Add Task</button>
              </div>
            </form>
          </aside>
        </div>

        <section id="allocation-section" class="panel">
          <div class="panel-head">
            <h2>Day Allocation</h2>
            <button id="toggle-allocation-btn" type="button" class="btn btn-ghost">Hide</button>
          </div>
          <div id="allocation-view" class="allocation-view">
            <div class="allocation-container">
              <div id="allocation-bar" class="allocation-bar"></div>
              <div id="allocation-quota-marker" class="allocation-quota-marker">
                <span id="allocation-quota-label" class="allocation-quota-label"></span>
              </div>
            </div>
            <p id="allocation-legend" class="allocation-legend mono muted"></p>
          </div>
        </section>
      </section>
    </main>

    <dialog id="carryover-modal" class="modal">
      <form method="dialog" class="modal-content">
        <h2>Unfinished Tasks Found</h2>
        <p id="carryover-copy"></p>
        <ul id="carryover-list" class="carryover-list"></ul>
        <div class="modal-actions">
          <button id="carryover-move-all" type="button" class="btn btn-primary">Move All</button>
          <button id="carryover-dismiss-all" type="button" class="btn btn-secondary">Dismiss All</button>
          <button id="carryover-close" type="button" class="btn btn-ghost">Close</button>
        </div>
      </form>
    </dialog>

    <dialog id="task-edit-modal" class="modal">
      <form id="task-edit-form" class="modal-content">
        <h2>Edit Task</h2>
        <div class="field-row">
          <label for="task-edit-title">Task Title</label>
          <input id="task-edit-title" name="taskEditTitle" type="text" maxlength="120" required autocomplete="off" placeholder="Refine your task..." />
        </div>
        <div class="form-grid">
          <div class="field-row">
            <label for="task-edit-priority">Priority</label>
            <select id="task-edit-priority" name="taskEditPriority">
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="field-row">
            <label for="task-edit-estimated">Estimated Minutes</label>
            <input id="task-edit-estimated" name="taskEditEstimated" type="number" min="0" step="5" inputmode="numeric" autocomplete="off" placeholder="30" />
          </div>
        </div>
        <div class="field-row">
          <label for="task-edit-notes">Notes</label>
          <textarea id="task-edit-notes" rows="3" maxlength="500" placeholder="Add context..."></textarea>
        </div>
        <div class="field-row">
          <label for="task-edit-link">Reference Link</label>
          <input id="task-edit-link" type="url" inputmode="url" autocomplete="off" placeholder="https://example.com/..." />
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save Task</button>
          <button id="task-edit-cancel" type="button" class="btn btn-ghost">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="tomorrow-planner-modal" class="modal">
      <form method="dialog" class="modal-content">
        <h2>Tomorrow Starts Tonight.</h2>
        <p>It is time to plan tomorrow. Open the Tomorrow section and add tasks now?</p>
        <div class="modal-actions">
          <button id="tomorrow-planner-open" type="button" class="btn btn-primary">Plan Tomorrow</button>
          <button id="tomorrow-planner-snooze" type="button" class="btn btn-secondary">Snooze 15m</button>
          <button id="tomorrow-planner-close" type="button" class="btn btn-ghost">Close</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
