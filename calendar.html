<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>Flowstate · Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js" defer></script>
    <script type="module" src="./js/pages/calendar-page.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand-wrap">
        <p class="brand" translate="no">flowstate<span class="brand-dot">.</span></p>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="./tasks.html">Tasks</a>
        <a href="./focus.html">Focus</a>
        <a href="./calendar.html" data-active="true">Calendar</a>
        <a href="./settings.html" class="top-nav-cog" aria-label="Settings">⚙</a>
      </nav>
    </header>

    <main class="app-main">
      <section class="view">
        <div class="section-head">
          <div>
            <h1>Calendar</h1>
            <p class="muted">Track completion trends, streaks, and workload.</p>
          </div>
          <div class="head-actions">
            <button id="toggle-heatmap" type="button" class="btn btn-secondary">Heatmap View</button>
          </div>
        </div>
        <section class="panel">
          <div class="calendar-filter-row">
            <label for="calendar-tag-filter" class="mono">Filter Tag</label>
            <select id="calendar-tag-filter">
              <option value="all">All</option>
            </select>
            <p id="streak-counter" class="mono muted">Streak: 0 days</p>
          </div>
          <div id="month-view" class="calendar-grid-wrap"></div>
          <div id="heatmap-view" class="heatmap-wrap" hidden></div>
        </section>
        <section class="panel">
          <h2>Week Summary</h2>
          <div id="week-summary" class="summary-grid"></div>
        </section>
      </section>
    </main>
  </body>
</html>
